<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>">
    <title>Spin the Wheel - Love Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <style>
        :root { --pink: #ff69b4; --hot-pink: #ff1493; --light-pink: #ffd1dc; --dark: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0011 50%, #0a0a0a 100%);
            color: #fff; min-height: 100vh; overflow-x: hidden;
        }
        #tsparticles { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0; }

        .back-btn {
            position:fixed;top:25px;left:25px;z-index:100;
            color:var(--light-pink);text-decoration:none;font-size:0.9rem;
            padding:10px 25px;border:1px solid rgba(255,105,180,0.2);
            border-radius:30px;backdrop-filter:blur(10px);
            background:rgba(10,10,10,0.8);transition:all 0.3s;letter-spacing:1px;
        }
        .back-btn:hover { background:var(--pink);color:#fff;border-color:transparent; }

        .game-page {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; z-index: 5; padding: 80px 20px 40px;
        }

        .game-title { text-align: center; margin-bottom: 50px; }
        .game-title h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: var(--pink);
            filter: drop-shadow(0 0 25px rgba(255,105,180,0.3));
        }
        .game-title p { color: rgba(255,255,255,0.5); font-size: 1rem; letter-spacing: 3px; margin-top: 10px; }

        .wheel-wrap {
            position: relative;
            width: 480px; height: 480px;
            margin: 0 auto;
        }
        .pointer {
            position: absolute; top: -28px; left: 50%;
            transform: translateX(-50%); font-size: 3.5rem;
            z-index: 10; filter: drop-shadow(0 3px 8px rgba(0,0,0,0.5));
        }
        #wheelCanvas {
            width: 480px; height: 480px;
            border-radius: 50%;
            box-shadow: 0 0 70px rgba(255,105,180,0.25), inset 0 0 30px rgba(255,105,180,0.1);
            border: 4px solid rgba(255,105,180,0.3);
            transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .spin-btn {
            margin-top: 50px; padding: 24px 90px;
            font-size: 1.4rem; font-family: 'Montserrat', sans-serif;
            font-weight: 700; border: none; border-radius: 60px;
            background: linear-gradient(135deg, var(--pink), var(--hot-pink));
            color: #fff; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 15px 45px rgba(255,20,147,0.35);
            letter-spacing: 3px;
        }
        .spin-btn:hover { transform: scale(1.08); box-shadow: 0 20px 60px rgba(255,20,147,0.45); }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .result {
            margin-top: 45px; padding: 40px 50px;
            background: rgba(255,105,180,0.06);
            border: 2px solid rgba(255,105,180,0.15);
            border-radius: 28px; display: none;
            animation: fadeIn 0.5s ease;
            max-width: 550px; text-align: center;
        }
        .result .r-emoji { font-size: 5rem; margin-bottom: 15px; }
        .result .r-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem; color: var(--light-pink);
        }
        .result .r-sub {
            font-size: 0.9rem; color: rgba(255,182,193,0.5);
            margin-top: 12px; letter-spacing: 2px;
        }
        @keyframes fadeIn { 0%{opacity:0;transform:scale(0.8)} 100%{opacity:1;transform:scale(1)} }

        .confetti-container { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden; }
        .confetti { position:absolute; animation: fall linear forwards; }
        @keyframes fall { 0%{opacity:1;transform:translateY(-10vh) rotate(0) scale(1)} 100%{opacity:0;transform:translateY(110vh) rotate(720deg) scale(0.3)} }

        @media (max-width:550px) {
            .wheel-wrap { width: 300px; height: 300px; }
            #wheelCanvas { width: 300px; height: 300px; }
            .spin-btn { padding: 18px 60px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div id="tsparticles"></div>
    <div class="confetti-container" id="confetti"></div>
    <a href="games.html" class="back-btn">Back to Games</a>

    <div class="game-page">
        <div class="game-title">
            <h1>Spin the Love Wheel</h1>
            <p>Let fate decide our romantic activity</p>
        </div>

        <div class="wheel-wrap">
            <div class="pointer">📍</div>
            <canvas id="wheelCanvas" width="480" height="480"></canvas>
        </div>

        <button class="spin-btn" id="spinBtn">SPIN 🎰</button>

        <div class="result" id="result">
            <div class="r-emoji" id="rEmoji"></div>
            <div class="r-text" id="rText"></div>
            <div class="r-sub">Do it now! No excuses 💕</div>
        </div>
    </div>

    <script>
    tsParticles.load("tsparticles", {
        particles: {
            number:{value:25},color:{value:["#ff69b4","#ff1493","#ffb6c1"]},
            shape:{type:["circle","star"]},
            opacity:{value:{min:0.1,max:0.3}},
            size:{value:{min:2,max:6}},
            move:{enable:true,speed:0.5,outModes:{default:"out"}},
            twinkle:{particles:{enable:true,frequency:0.03,color:"#ff69b4"}}
        }
    });

    function launchConfetti(n){var c=document.getElementById('confetti');var em=['💖','💗','💕','✨','🌸','💝','🎉'];for(var i=0;i<n;i++){(function(i){setTimeout(function(){var d=document.createElement('div');d.className='confetti';d.textContent=em[Math.floor(Math.random()*em.length)];d.style.left=Math.random()*100+'%';d.style.fontSize=(16+Math.random()*26)+'px';d.style.animationDuration=(2+Math.random()*3)+'s';c.appendChild(d);setTimeout(function(){d.remove();},5000);},i*30);})(i);}}

    var SEGS = [
        {text:'Kiss for\n10 seconds',emoji:'💋',color:'#ff69b4'},
        {text:'Share a\nfavorite memory',emoji:'🥰',color:'#e84393'},
        {text:'Slow dance\ntogether',emoji:'💃',color:'#fd79a8'},
        {text:'Write a love\nnote in 30s',emoji:'✍️',color:'#ff6b9d'},
        {text:'Give a\nback massage',emoji:'💆',color:'#c44569'},
        {text:'Say 3 things\nyou love',emoji:'💕',color:'#ff1493'},
        {text:'Plan a\ndream date',emoji:'🗓️',color:'#e056a0'},
        {text:'Hug for\n1 minute',emoji:'🤗',color:'#d63384'},
    ];

    var angle = 0, spinning = false;

    function drawWheel() {
        var canvas = document.getElementById('wheelCanvas');
        var ctx = canvas.getContext('2d');
        var cx = canvas.width/2, cy = canvas.height/2, r = cx - 15;
        var n = SEGS.length, arc = 2*Math.PI/n;

        ctx.clearRect(0,0,canvas.width,canvas.height);

        SEGS.forEach(function(seg, i) {
            var sa = i*arc - Math.PI/2, ea = sa + arc;
            ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,sa,ea);
            ctx.closePath(); ctx.fillStyle = seg.color; ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 2; ctx.stroke();

            ctx.save(); ctx.translate(cx,cy); ctx.rotate(sa + arc/2);
            ctx.textAlign = 'center'; ctx.fillStyle = '#fff';
            ctx.font = '32px serif'; ctx.fillText(seg.emoji, r*0.63, 7);
            ctx.font = 'bold 13px Montserrat, sans-serif';
            seg.text.split('\n').forEach(function(line, li) {
                ctx.fillText(line, r*0.38, -7 + li*16);
            });
            ctx.restore();
        });

        ctx.beginPath(); ctx.arc(cx,cy,32,0,2*Math.PI);
        ctx.fillStyle = '#1a0011'; ctx.fill();
        ctx.strokeStyle = '#ff69b4'; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.font = '22px serif';
        ctx.textAlign = 'center'; ctx.fillText('💖', cx, cy+8);
    }

    drawWheel();

    document.getElementById('spinBtn').addEventListener('click', function() {
        if (spinning) return;
        spinning = true;
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('result').style.display = 'none';

        var canvas = document.getElementById('wheelCanvas');
        var extra = 360*(5+Math.random()*3);
        var rand = Math.random()*360;
        var total = angle + extra + rand;

        canvas.style.transition = 'transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
        canvas.style.transform = 'rotate('+total+'deg)';
        angle = total;

        setTimeout(function() {
            var fa = total % 360;
            var sa = 360/SEGS.length;
            var idx = Math.floor(((360-fa+sa/2)%360)/sa) % SEGS.length;
            var r = SEGS[idx];
            document.getElementById('rEmoji').textContent = r.emoji;
            document.getElementById('rText').textContent = r.text.replace(/\n/g, ' ');
            document.getElementById('result').style.display = 'block';
            spinning = false;
            document.getElementById('spinBtn').disabled = false;
            launchConfetti(50);
        }, 5200);
    });
    </script>
</body>
</html>
