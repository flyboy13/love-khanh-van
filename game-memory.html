<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💖</text></svg>">
    <title>Memory Match - Love Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <style>
        :root { --pink: #ff69b4; --hot-pink: #ff1493; --light-pink: #ffd1dc; --dark: #0a0a0a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0011 50%, #0a0a0a 100%);
            color: #fff; min-height: 100vh; overflow-x: hidden;
        }
        #tsparticles { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0; }

        .back-btn {
            position:fixed;top:25px;left:25px;z-index:100;
            color:var(--light-pink);text-decoration:none;font-size:0.9rem;
            padding:10px 25px;border:1px solid rgba(255,105,180,0.2);
            border-radius:30px;backdrop-filter:blur(10px);
            background:rgba(10,10,10,0.8);transition:all 0.3s;letter-spacing:1px;
        }
        .back-btn:hover { background:var(--pink);color:#fff;border-color:transparent; }

        .game-page {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; z-index: 5; padding: 80px 20px 40px;
        }

        .game-title { text-align: center; margin-bottom: 40px; }
        .game-title h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: var(--pink);
            filter: drop-shadow(0 0 25px rgba(255,105,180,0.3));
        }
        .game-title p { color: rgba(255,255,255,0.5); font-size: 1rem; letter-spacing: 3px; margin-top: 10px; }

        .stats {
            display: flex; justify-content: center; gap: 60px;
            margin-bottom: 40px;
        }
        .stat { text-align: center; }
        .stat span { font-size: 2.8rem; font-weight: 700; color: var(--pink); display: block; }
        .stat label { font-size: 0.9rem; color: rgba(255,182,193,0.6); }

        .board {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; max-width: 700px; width: 100%;
        }

        .card {
            aspect-ratio: 1; perspective: 1000px; cursor: pointer;
        }
        .card-inner {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23,1,0.32,1);
            border-radius: 22px;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card.matched .card-inner { transform: rotateY(180deg); box-shadow: 0 0 40px rgba(255,105,180,0.5); }
        .card.matched { animation: pop 0.5s ease; }
        @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }

        .face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
        }
        .front {
            background: linear-gradient(145deg, rgba(255,105,180,0.1), rgba(255,20,147,0.05));
            border: 2px solid rgba(255,105,180,0.15);
        }
        .front::after {
            content: '?'; font-family: 'Great Vibes', cursive;
            font-size: 4rem; color: var(--pink);
        }
        .back {
            background: linear-gradient(145deg, rgba(255,105,180,0.15), rgba(255,20,147,0.08));
            border: 2px solid rgba(255,105,180,0.3);
            transform: rotateY(180deg); font-size: 4.5rem;
        }

        .win { display: none; text-align: center; animation: fadeIn 0.8s ease; }
        .win .emoji { font-size: 6rem; }
        .win h2 {
            font-family: 'Great Vibes', cursive; font-size: 3.5rem;
            color: var(--pink); margin: 20px 0 15px;
        }
        .win p { color: rgba(255,255,255,0.7); font-size: 1.2rem; line-height: 1.8; }
        @keyframes fadeIn { 0%{opacity:0;transform:scale(0.5)} 100%{opacity:1;transform:scale(1)} }

        .btn-restart {
            margin-top: 30px; padding: 14px 50px;
            border: 2px solid var(--pink); border-radius: 50px;
            background: transparent; color: var(--pink);
            font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-restart:hover { background: var(--pink); color: #fff; }

        .confetti-container { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden; }
        .confetti { position:absolute; animation: fall linear forwards; }
        @keyframes fall { 0%{opacity:1;transform:translateY(-10vh) rotate(0) scale(1)} 100%{opacity:0;transform:translateY(110vh) rotate(720deg) scale(0.3)} }

        @media (max-width:600px) {
            .board { gap: 10px; max-width: 360px; }
            .front::after { font-size: 2.5rem; }
            .back { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div id="tsparticles"></div>
    <div class="confetti-container" id="confetti"></div>
    <a href="games.html" class="back-btn">Back to Games</a>

    <div class="game-page">
        <div class="game-title">
            <h1>Love Memory Match</h1>
            <p>Match the pairs to unlock a surprise</p>
        </div>

        <div class="stats">
            <div class="stat"><span id="moves">0</span><label>Moves</label></div>
            <div class="stat"><span id="pairs">0</span><label>Pairs Found</label></div>
        </div>

        <div class="board" id="board"></div>

        <div class="win" id="win">
            <div class="emoji">🎉💖🎉</div>
            <h2>You Found All Pairs!</h2>
            <p>Just like how we found each other in this big world.<br>You complete me. 💕</p>
            <button class="btn-restart" onclick="init()">Play Again</button>
        </div>
    </div>

    <script>
    tsParticles.load("tsparticles", {
        particles: {
            number:{value:30},color:{value:["#ff69b4","#ff1493","#ffb6c1"]},
            shape:{type:["circle","star"]},
            opacity:{value:{min:0.1,max:0.3}},
            size:{value:{min:2,max:6}},
            move:{enable:true,speed:0.5,outModes:{default:"out"}},
            twinkle:{particles:{enable:true,frequency:0.03,color:"#ff69b4"}}
        }
    });

    function launchConfetti(n){var c=document.getElementById('confetti');var em=['💖','💗','💕','✨','🌸','💝','🎉','💘'];for(var i=0;i<n;i++){(function(i){setTimeout(function(){var d=document.createElement('div');d.className='confetti';d.textContent=em[Math.floor(Math.random()*em.length)];d.style.left=Math.random()*100+'%';d.style.fontSize=(16+Math.random()*26)+'px';d.style.animationDuration=(2+Math.random()*3)+'s';c.appendChild(d);setTimeout(function(){d.remove();},5000);},i*30);})(i);}}

    var PAIRS = [
        {emoji:'❤️',name:'heart'},{emoji:'🌹',name:'rose'},{emoji:'💋',name:'kiss'},
        {emoji:'💍',name:'ring'},{emoji:'💌',name:'letter'},{emoji:'💑',name:'couple'},
        {emoji:'🍫',name:'choco'},{emoji:'🌸',name:'blossom'}
    ];

    var flipped=[], matched=0, moves=0, locked=false;

    function init() {
        var board = document.getElementById('board');
        board.innerHTML = '';
        board.style.display = 'grid';
        document.getElementById('win').style.display = 'none';
        flipped=[]; matched=0; moves=0; locked=false;
        document.getElementById('moves').textContent='0';
        document.getElementById('pairs').textContent='0';

        var cards = PAIRS.concat(PAIRS).sort(function(){return Math.random()-0.5;});
        cards.forEach(function(c, i) {
            var el = document.createElement('div');
            el.className = 'card';
            el.dataset.name = c.name;
            el.innerHTML = '<div class="card-inner"><div class="face front"></div><div class="face back">'+c.emoji+'</div></div>';
            el.addEventListener('click', function(){ flip(el); });
            board.appendChild(el);
        });
    }

    function flip(card) {
        if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
        card.classList.add('flipped');
        flipped.push(card);
        if (flipped.length === 2) {
            moves++;
            document.getElementById('moves').textContent = moves;
            locked = true;
            if (flipped[0].dataset.name === flipped[1].dataset.name) {
                flipped[0].classList.add('matched');
                flipped[1].classList.add('matched');
                matched++;
                document.getElementById('pairs').textContent = matched;
                flipped = []; locked = false;
                launchConfetti(8);
                if (matched === PAIRS.length) {
                    setTimeout(function(){
                        document.getElementById('board').style.display='none';
                        document.getElementById('win').style.display='block';
                        launchConfetti(100);
                    }, 600);
                }
            } else {
                setTimeout(function(){
                    flipped[0].classList.remove('flipped');
                    flipped[1].classList.remove('flipped');
                    flipped=[]; locked=false;
                }, 900);
            }
        }
    }

    init();
    </script>
</body>
</html>
